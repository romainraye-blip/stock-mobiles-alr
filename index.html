<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Stock Mobiles - ALR</title><style>:root{color-scheme:light;--amboise:#6366f1;--angers:#f97316;--chateaudun:#10b981;--cholet:#8b5cf6;--romorantin:#ec4899;--vendome:#f59e0b}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#f0f2f8;color:#1a1a2e;min-height:100vh}.header{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:1.5rem 1.5rem 5rem;position:relative}.header-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px}.brand-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:22px}.brand-text h1{font-size:18px;font-weight:700;color:#fff}.brand-text p{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}.update-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.6)}.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:5px;animation:pulse 2s infinite;vertical-align:middle}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.cards-wrapper{margin-top:-3.5rem;padding:0 1.5rem;overflow-x:auto;scrollbar-width:none}.cards-row{display:flex;gap:12px;padding-bottom:4px;min-width:max-content}.ag-card{border-radius:16px;padding:16px 18px 14px;min-width:110px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.12);cursor:pointer;transition:transform .15s;position:relative;overflow:hidden;border:2px solid transparent}.ag-card:hover{transform:translateY(-2px)}.ag-card.active{border-color:currentColor;transform:translateY(-2px)}.ag-name{font-size:10px;font-weight:700;text-transform:uppercase;opacity:.8;margin-bottom:6px}.ag-count{font-size:32px;font-weight:800;line-height:1}.ag-label{font-size:10px;opacity:.65;margin-top:3px}.ag-card.all-card{background:#1a1a2e;color:#fff}.ag-card[data-ag="AMBOISE"]{background:#eef2ff;color:var(--amboise)}.ag-card[data-ag="ANGERS"]{background:#fff7ed;color:var(--angers)}.ag-card[data-ag="CHATEAUDUN"]{background:#ecfdf5;color:var(--chateaudun)}.ag-card[data-ag="CHOLET"]{background:#f5f3ff;color:var(--cholet)}.ag-card[data-ag="ROMORANTIN"]{background:#fdf2f8;color:var(--romorantin)}.ag-card[data-ag="VENDOME"]{background:#fffbeb;color:var(--vendome)}.main{padding:1.25rem 1.5rem 3rem;max-width:900px;margin:0 auto}.search-wrap{position:relative;margin-bottom:1rem}.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#94a3b8;pointer-events:none}.search-wrap input{width:100%;padding:12px 14px 12px 40px;border:2px solid #e2e8f0;border-radius:14px;font-size:14px;font-family:inherit;background:#fff;outline:none}.search-wrap input:focus{border-color:#6366f1}.search-wrap input::placeholder{color:#cbd5e1}.statusbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}.status-count{font-size:12px;font-weight:600;color:#64748b}.status-label{font-size:12px;color:#94a3b8}.table-outer{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid #e8eaf0}.table-scroll{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}thead tr{background:#f8fafc}thead th{padding:12px 14px;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:2px solid #f1f5f9;text-align:center;white-space:nowrap}thead th:first-child{text-align:left;color:#64748b}.th-ag{font-weight:800}.th-ag[data-ag="AMBOISE"]{color:var(--amboise)}.th-ag[data-ag="ANGERS"]{color:var(--angers)}.th-ag[data-ag="CHATEAUDUN"]{color:var(--chateaudun)}.th-ag[data-ag="CHOLET"]{color:var(--cholet)}.th-ag[data-ag="ROMORANTIN"]{color:var(--romorantin)}.th-ag[data-ag="VENDOME"]{color:var(--vendome)}tbody tr{border-bottom:1px solid #f8fafc}tbody tr.totals-row{background:#f8faff}tbody tr:not(.totals-row):hover{background:#f8faff}tbody td{padding:9px 14px;text-align:center}tbody td:first-child{text-align:left;color:#334155;font-size:12px;padding-right:1rem}.totals-row td{font-weight:700;border-top:2px solid #e8eaf0}.qty-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:24px;border-radius:8px;font-size:12px;font-weight:700;padding:0 6px}.qty-zero{color:#e2e8f0}.qty-badge[data-ag="AMBOISE"]{background:#eef2ff;color:var(--amboise)}.qty-badge[data-ag="ANGERS"]{background:#fff7ed;color:var(--angers)}.qty-badge[data-ag="CHATEAUDUN"]{background:#ecfdf5;color:var(--chateaudun)}.qty-badge[data-ag="CHOLET"]{background:#f5f3ff;color:var(--cholet)}.qty-badge[data-ag="ROMORANTIN"]{background:#fdf2f8;color:var(--romorantin)}.qty-badge[data-ag="VENDOME"]{background:#fffbeb;color:var(--vendome)}.qty-total{background:#1a1a2e;color:#fff;display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:24px;border-radius:8px;font-size:12px;font-weight:700;padding:0 6px}.footer{text-align:center;margin-top:2rem;font-size:11px;color:#94a3b8}</style></head><body><div class="header"><div class="header-inner"><div class="brand"><div class="brand-icon">&#128241;</div><div class="brand-text"><h1>Stock Mobiles</h1><p>Anjou Liaisons Radio &mdash; 6 agences</p></div></div><div class="update-badge"><span class="live-dot"></span><span id="lastUpdate">Chargement...</span></div></div></div><div class="cards-wrapper"><div class="cards-row" id="agencyCards"></div></div><div class="main"><div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="search" placeholder="Rechercher un modele..." oninput="renderTable()"/></div><div class="statusbar"><span class="status-count" id="statusCount"></span><span class="status-label" id="statusLabel"></span></div><div class="table-outer"><div class="table-scroll"><div id="tableContent"></div></div></div><div class="footer">Source: 3GWIN - Mise a jour automatique toutes les heures</div></div><script>const STOCK_DATA={"lastUpdate":"Vérifié le 25/06/2026 à 11:04 · Source 3GWIN 10:57","agencies":["AMBOISE","ANGERS","CHATEAUDUN","CHOLET","ROMORANTIN","VENDOME"],"products":[{"name":"APPLE IPHONE 17 256GO LAVANDE SFR","quantities":[0,0,0,1,0,0]},{"name":"APPLE IPHONE 17 256GO NOIR SFR","quantities":[1,1,1,2,2,1]},{"name":"APPLE IPHONE 17 PRO 256GO BLEU INT SFR","quantities":[0,1,0,1,1,0]},{"name":"APPLE IPHONE 17E 256GO NOIR SFR-TEAM","quantities":[0,0,0,1,0,0]},{"name":"APPLE IPHONE AIR 256GO NOIR SIDERAL SFR-TEAM","quantities":[0,1,0,0,0,0]},{"name":"Box 5G recyclee version SFR SFR","quantities":[0,4,0,1,0,0]},{"name":"DORO LEVA L30 BLACK SFR","quantities":[1,1,2,1,2,1]},{"name":"DORO LEVA L30 RED SFR","quantities":[1,0,0,0,1,0]},{"name":"HONOR 400 SMART 128GO GRIS SFR","quantities":[0,1,0,0,0,0]},{"name":"HONOR 600 256GO NOIR SFR","quantities":[0,0,0,1,0,0]},{"name":"HONOR 600 LITE 256GO NOIR SFR","quantities":[0,1,0,2,1,1]},{"name":"HONOR 600 SMART 128GO NOIR SFR","quantities":[2,0,0,0,3,0]},{"name":"HONOR MAGIC 5 PRO 5G NOIR 512GO SFR","quantities":[0,0,0,0,0,1]},{"name":"HONOR MAGIC 8 LITE 256GO NOIR SFR","quantities":[0,1,0,1,0,0]},{"name":"HONOR X5C PLUS 64GO NOIR SFR","quantities":[0,2,4,2,4,1]},{"name":"HONOR X6B 128GO NOIR SFR","quantities":[0,1,0,0,0,0]},{"name":"IPHONE 13 128GO BLEU TRES BON ETAT SFR","quantities":[1,0,0,0,0,0]},{"name":"PACK MAGIC 8 LITE + HONOR HEADPHONE LITE SFR","quantities":[0,0,1,0,0,0]},{"name":"SAMSUNG GALAXY A17 5G 128GO BLEU SFR","quantities":[2,0,2,2,0,0]},{"name":"SAMSUNG GALAXY A17 5G 128GO NOIR SFR","quantities":[3,2,3,2,0,1]},{"name":"SAMSUNG GALAXY A36 5G 128GO LAVANDE SFR","quantities":[0,0,1,0,0,0]},{"name":"SAMSUNG GALAXY A37 128GO LAVANDE SFR","quantities":[1,0,0,0,1,0]},{"name":"SAMSUNG GALAXY A37 256GO GRAPHITE SFR","quantities":[0,1,2,0,1,1]},{"name":"SAMSUNG GALAXY A55 5G 128GO BLEU SFR","quantities":[1,0,0,0,0,0]},{"name":"SAMSUNG GALAXY A56 5G 256GO GRAPHITE SFR","quantities":[0,0,0,0,1,0]},{"name":"SAMSUNG GALAXY A56 5G EE 256GO GRAPHITE SFR","quantities":[0,3,0,0,0,0]},{"name":"SAMSUNG GALAXY A57 256GO BLEU NUIT SFR","quantities":[1,1,0,0,0,0]},{"name":"SAMSUNG GALAXY S24 ULTRA 5G 256GO NOIR SFR","quantities":[1,0,0,0,0,0]},{"name":"SAMSUNG GALAXY S26 5G 256GO NOIR SFR","quantities":[0,0,0,1,0,0]},{"name":"XIAOMI 15T 256GO NOIR SFR","quantities":[0,0,1,0,0,0]},{"name":"XIAOMI REDMI NOTE 15 5G 256GO NOIR SFR-TEAM","quantities":[0,0,0,1,0,0]}]};let ag="all";function init(){document.getElementById("lastUpdate").textContent=STOCK_DATA.lastUpdate;buildCards();renderTable()}function buildCards(){const{agencies,products}=STOCK_DATA;const tots=agencies.map((_,i)=>products.reduce((s,p)=>s+(p.quantities[i]||0),0));const g=tots.reduce((a,b)=>a+b,0);const row=document.getElementById("agencyCards");const ac=document.createElement("div");ac.className="ag-card all-card"+(ag==="all"?" active":"");ac.dataset.ag="all";ac.innerHTML="<div class=\"ag-name\">Toutes</div><div class=\"ag-count\">"+g+"</div><div class=\"ag-label\">mobiles</div>";ac.onclick=()=>setAg("all");row.appendChild(ac);agencies.forEach((a,i)=>{const c=document.createElement("div");c.className="ag-card"+(ag===a?" active":"");c.dataset.ag=a;c.innerHTML="<div class=\"ag-name\">"+a+"</div><div class=\"ag-count\">"+tots[i]+"</div><div class=\"ag-label\">mobile"+(tots[i]>1?"s":"")+"</div>";c.onclick=()=>setAg(a);row.appendChild(c)})}function setAg(a){ag=a;document.querySelectorAll(".ag-card").forEach(c=>c.classList.toggle("active",c.dataset.ag===a));renderTable()}function renderTable(){const{agencies,products}=STOCK_DATA;const s=document.getElementById("search").value.toLowerCase().trim();const cols=ag==="all"?agencies.map((_,i)=>i):[agencies.indexOf(ag)];const rows=products.filter(p=>{if(s&&!p.name.toLowerCase().includes(s))return false;if(ag!=="all"&&(p.quantities[agencies.indexOf(ag)]||0)===0)return false;return true});const n=rows.length;document.getElementById("statusCount").textContent=n===0?"Aucun resultat":n+" modele"+(n>1?"s":"");document.getElementById("statusLabel").textContent=ag==="all"?"- toutes agences":"- "+ag+" uniquement";if(!n){document.getElementById("tableContent").innerHTML="<div style=\"padding:3rem;text-align:center;color:#94a3b8\">Aucun modele</div>";return}const st=cols.length>1;const ct=cols.map(ci=>rows.reduce((s,p)=>s+(p.quantities[ci]||0),0));const gt=ct.reduce((a,b)=>a+b,0);const hd=cols.map(ci=>"<th class=\"th-ag\" data-ag=\""+agencies[ci]+"\">"+agencies[ci]+"</th>").join("");const tb=rows.map(p=>{const cs=cols.map(ci=>{const q=p.quantities[ci]||0;return q===0?"<td><span class=\"qty-zero\">-</span></td>":"<td><span class=\"qty-badge\" data-ag=\""+agencies[ci]+"\">"+q+"</span></td>"}).join("");const rt=cols.reduce((s,ci)=>s+(p.quantities[ci]||0),0);return"<tr><td>"+p.name+"</td>"+cs+(st?"<td><span class=\"qty-total\">"+rt+"</span></td>":"")+"</tr>"}).join("");const tr="<tr class=\"totals-row\"><td style=\"font-weight:700\">Total</td>"+ct.map((t,i)=>"<td><span class=\"qty-badge\" data-ag=\""+agencies[cols[i]]+"\">"+t+"</span></td>").join("")+(st?"<td><span class=\"qty-total\">"+gt+"</span></td>":"")+"</tr>";document.getElementById("tableContent").innerHTML="<table><thead><tr><th style=\"text-align:left;width:40%;color:#64748b\">Modele</th>"+hd+(st?"<th>Total</th>":"")+"</tr></thead><tbody>"+tb+tr+"</tbody></table>"}init();</script></body></html>
